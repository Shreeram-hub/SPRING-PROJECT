<!DOCTYPE html>
<htm xmlns:th="http://www.thymeleaf.org">

	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>投稿編集 | Spring Board</title>
		<style>
			:root {
				--primary-color: #4a90e2;
				--primary-hover: #357abd;
				--bg-color: #f8f9fa;
				--card-bg: #ffffff;
				--text-main: #333333;
				--text-muted: #666666;
				--border-radius: 12px;
				--shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
				--border-color: #e0e0e0;
			}

			body {
				font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
				background-color: var(--bg-color);
				color: var(--text-main);
				margin: 0;
				padding: 40px 20px;
				line-height: 1.6;
			}

			.container {
				max-width: 600px;
				margin: 0 auto;
			}

			header {
				margin-bottom: 40px;
				text-align: center;
			}

			h1 {
				font-size: 2rem;
				color: var(--primary-color);
				margin: 0;
				font-weight: 800;
				letter-spacing: -1px;
			}

			.form-card {
				background-color: var(--card-bg);
				border-radius: var(--border-radius);
				padding: 32px;
				box-shadow: var(--shadow);
				border: 1px solid rgba(0, 0, 0, 0.03);
			}

			.form-group {
				margin-bottom: 24px;
			}

			label {
				display: block;
				font-weight: 600;
				margin-bottom: 8px;
				color: var(--text-main);
			}

			input[type="text"],
			textarea {
				width: 100%;
				padding: 12px;
				border: 1px solid var(--border-color);
				border-radius: 8px;
				font-size: 1rem;
				font-family: inherit;
				box-sizing: border-box;
				transition: border-color 0.2s, box-shadow 0.2s;
			}

			input[type="text"]:focus,
			textarea:focus {
				outline: none;
				border-color: var(--primary-color);
				box-shadow: 0 0 0 3px rgba(74, 144, 226, 0.1);
			}

			textarea {
				min-height: 150px;
				resize: vertical;
			}

			.button-group {
				display: flex;
				gap: 12px;
				margin-top: 32px;
			}

			.btn {
				flex: 1;
				padding: 14px;
				border-radius: 8px;
				font-size: 1rem;
				font-weight: 600;
				cursor: pointer;
				text-align: center;
				text-decoration: none;
				transition: all 0.2s;
				border: none;
			}

			.btn-primary {
				background-color: var(--primary-color);
				color: white;
			}

			.btn-primary:hover {
				background-color: var(--primary-hover);
				transform: translateY(-1px);
			}

			.btn-secondary {
				background-color: transparent;
				border: 1px solid var(--border-color);
				color: var(--text-muted);
			}

			.btn-secondary:hover {
				background-color: #f0f0f0;
				color: var(--text-main);
			}

			.btn-danger {
				background-color: #dc3545;
				color: white;
			}

			.btn-danger:hover {
				background-color: #b02a37;

			}

			.button-group {
				display: flex;
				gap: 12px;
				margin-top: 32px;
			}

			.button-group form {
				flex: 1;
				margin: 0;
			}

			.button-group form .btn {
				width: 100%;
			}

			.btn {
				flex: 1;
			}
		</style>
	</head>

	<body>
		<div class="container">
			<header>
				<h1>投稿編集</h1>
			</header>

			<main class="form-card">
				<form action="/post" method="post" th:object="${entity}">

					<input type="hidden" th:field="*{id}">

					<!-- нэр -->
					<div class="form-group">
						<label>投稿者名</label>
						<input type="text" th:field="*{name}">
					</div>

					<!-- genre -->
					<div class="form-group">
						<label>ジャンル</label>
						<select th:field="*{id}">

							<th:block th:each="genre : ${genres}">
								<option th:value="${genre.id}" th:text="${genre.name}">
								</option>
							</th:block>
						</select>
					</div>

					<!-- content -->
					<div class="form-group">
						<label>本文</label>
						<textarea th:field="*{content}"></textarea>
					</div>

					<div class="button-group">
						<a href="/board" class="btn btn-secondary">戻る</a>

						<button type="submit" class="btn btn-primary">
							更新する
						</button>


				</form>


				<form th:action="@{/delete/{id}(id=${entity.id})}" method="post" onsubmit="return confirm('削除しますか？');">

					<button type="submit" class="btn btn-danger">
						削除
					</button>

				</form>
		</div>

	</body>

	</html>
